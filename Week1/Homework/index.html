<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>민나 블로그</title>
    <link rel="stylesheet" href="./styles/index.css" />
    <style>
      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          "Helvetica Neue",
          "Segoe UI",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          "Malgun Gothic",
          "Apple Color Emoji",
          "Segoe UI Emoji",
          "Segoe UI Symbol",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header__left">
        <img
          src="./images/header-logo/avatar.png"
          alt="튜브 아바타"
          class="avatar__img"
        />
      </div>

      <div class="header__center">
        <h1>민나 블로그</h1>
      </div>

      <div class="header__right">
        <a
          href="https://github.com/kimminna"
          target="_blank"
          class="social__link"
        >
          <img
            src="./images/header-logo/github.png"
            alt="깃허브 아이콘"
            class="social__icon__img"
          />
        </a>
      </div>
    </header>

    <div class="container">
      <nav class="nav">
        <ul>
          <li><a href="#photo-dump">📷 포토 덤프</a></li>
          <li><a href="#likes">좋아하는 것</a></li>
          <li><a href="#interests">내 관심사</a></li>
          <li><a href="#message">To. 웹왔니</a></li>
        </ul>
      </nav>

      <main class="content">
        <section id="photo__dump" class="section">
          <h2>📷 포토 덤프</h2>
          <div class="photo__grid">
            <div class="grid__item item-1">
              <img src="./images/photo-dump/pd-01.png" alt="본인 사진" />
            </div>
            <div class="grid__item item-2">
              <img src="./images/photo-dump/pd-02.png" alt="강아지 사진" />
            </div>
            <div class="grid__item item-3">
              <img src="./images/photo-dump/pd-03.png" alt="도모군 사진" />
            </div>
            <div class="grid__item item-4">
              <img src="./images/photo-dump/pd-04.png" alt="짱구 사진" />
            </div>
            <div class="grid__item item-5">
              <img src="./images/photo-dump/pd-05.png" alt="그림 사진" />
            </div>
            <div class="grid__item item-6">
              <img src="./images/photo-dump/pd-06.png" alt="튜브 사진" />
            </div>
          </div>
        </section>

        <section id="likes" class="section">
          <h2>좋아하는 것: 리락쿠마 (●'◡'●)</h2>
          <div class="loop__container">
            <div class="loop__track">
              <img src="./images/likes/like-01.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-02.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-03.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-04.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-05.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-01.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-02.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-03.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-04.png" alt="리락쿠마 사진" />
              <img src="./images/likes/like-05.png" alt="리락쿠마 사진" />
            </div>
          </div>
        </section>

        <section id="interests" class="section">
          <h2>내 관심사 🎭</h2>
          <div class="card__container">
            <div class="card">
              <div class="card__img">
                <img src="./images/interests/it-01.png" alt="강훈 사진" />
              </div>
              <h4>강훈 🥰</h4>
              <div class="card__btns">
                <button class="btn__like">좋아요</button>
                <button class="btn__dislike">싫어요</button>
              </div>
            </div>
            <div class="card">
              <div class="card__img">
                <img
                  src="./images/interests/it-02.png"
                  alt="뮤지컬 어쩌면 해피엔딩 사진"
                />
              </div>
              <h4>어햎 🥰</h4>
              <div class="card__btns">
                <button class="btn__like">좋아요</button>
                <button class="btn__dislike">싫어요</button>
              </div>
            </div>
            <div class="card">
              <div class="card__img">
                <img src="./images/interests/it-03.png" alt="수지 사진" />
              </div>
              <h4>수지 🥰</h4>
              <div class="card__btns">
                <button class="btn__like">좋아요</button>
                <button class="btn__dislike">싫어요</button>
              </div>
            </div>
            <div class="card">
              <div class="card__img">
                <img src="./images/interests/it-04.png" alt="최우식 사진" />
              </div>
              <h4>최우식 🥰</h4>
              <div class="card__btns">
                <button class="btn__like">좋아요</button>
                <button class="btn__dislike">싫어요</button>
              </div>
            </div>
            <div class="card">
              <div class="card__img">
                <img src="./images/interests/it-05.png" alt="몬치치 사진" />
              </div>
              <h4>몬치치 🥰</h4>
              <div class="card__btns">
                <button class="btn__like">좋아요</button>
                <button class="btn__dislike">싫어요</button>
              </div>
            </div>
            <div class="card">
              <div class="card__img">
                <img src="./images/interests/it-06.png" alt="튜브 사진" />
              </div>
              <h4>튜브 🥰</h4>
              <div class="card__btns">
                <button class="btn__like">좋아요</button>
                <button class="btn__dislike">싫어요</button>
              </div>
            </div>
            <div class="card">
              <div class="card__img">
                <img src="./images/interests/it-07.png" alt="맥북 사진" />
              </div>
              <h4>맥북 🥰</h4>
              <div class="card__btns">
                <button class="btn__like">좋아요</button>
                <button class="btn__dislike">싫어요</button>
              </div>
            </div>
          </div>
        </section>

        <section id="message">
          <h2>To. 웹왔니</h2>
          <ul class="message__list">
            <li class="pseudo__icon">잘부탁해용</li>
            <li class="pseudo__icon">웹왓니 빠이팅</li>
          </ul>
        </section>
      </main>
    </div>

    <footer class="footer">
      <p>자기소개 끗~~</p>
    </footer>
  </body>
</html>
